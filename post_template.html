<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | AI Agent Index</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <meta property="og:title" content="{{TITLE}} | ROI Analysis">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{URL}}">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TechArticle",
      "headline": "{{TITLE}} AI Agent Analysis",
      "description": "{{DESCRIPTION}}",
      "datePublished": "{{DATE}}",
      "dateModified": "{{DATE}}",
      "author": {
        "@type": "Organization",
        "name": "Global AI Agent Directory"
      }
    }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="../" class="text-indigo-600 font-bold">← Back to Index</a>
            <span class="text-xs text-slate-400">Last Updated: {{DATE}}</span>
        </div>
    </header>
    <main class="max-w-4xl mx-auto px-6 py-16">
        <article class="prose prose-slate lg:prose-xl bg-white p-10 rounded-3xl shadow-sm border border-slate-100 mb-12">
            <div class="text-sm font-bold text-indigo-500 mb-2 uppercase tracking-widest">Expert Analysis</div>
            <h1 class="text-4xl font-black mb-8">{{TITLE}}</h1>
            <div id="content" class="leading-relaxed space-y-6">{{CONTENT}}</div>
        </article>

        <section class="mt-16">
            <h2 class="text-2xl font-bold mb-6">Explore Other Agents</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                {{RELATED_POSTS}}
            </div>
        </section>
    </main>
    <footer class="text-center py-10 text-slate-400 text-sm border-t mt-12">
        &copy; 2026 AI Agent Directory. All analysis is AI-driven and updated daily.
    </footer>
</body>
</html>
