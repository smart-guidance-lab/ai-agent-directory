<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Index | Live Market Intelligence</title>
    <meta name="google-site-verification" content="n2V60v_i47eXrWEGYi1WRTrD9-tidkXkJhrbjDgTkXU" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .featured-glow { box-shadow: 0 0 25px rgba(79, 70, 229, 0.2); border: 2px solid #4f46e5; }
        .stat-card { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg">A</div>
                <h1 class="text-xl font-black tracking-tighter uppercase">Agent<span class="text-indigo-600">Index</span></h1>
            </div>
            <a href="https://buy.stripe.com/aFafZgepV8NW7Cwc788so07" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-full text-sm font-bold transition-all shadow-md">Submit Your Agent</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <section class="mb-16 grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="stat-card p-6 rounded-3xl border border-slate-200 text-center">
                <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Tracked Agents</div>
                <div class="text-3xl font-black text-slate-800">{{TOTAL_COUNT}}</div>
            </div>
            <div class="stat-card p-6 rounded-3xl border border-slate-200 text-center">
                <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Market Heat</div>
                <div class="text-3xl font-black text-orange-500">{{TOTAL_STARS}}k</div>
            </div>
            <div class="stat-card p-6 rounded-3xl border border-slate-200 text-center">
                <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Rating Engine</div>
                <div class="text-3xl font-black text-indigo-600">v4.2</div>
            </div>
            <div class="stat-card p-6 rounded-3xl border border-slate-200 text-center">
                <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Status</div>
                <div class="text-3xl font-black text-green-500 flex items-center justify-center gap-2">
                    <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>
                    LIVE
                </div>
            </div>
        </section>

        <section class="mb-20">
            <h2 class="text-sm font-black text-slate-400 uppercase tracking-[0.3em] mb-8">Premium Partners</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <a href="https://buy.stripe.com/aFafZgepV8NW7Cwc788so07" class="featured-glow bg-white p-8 rounded-3xl flex flex-col items-center justify-center text-center group transition-all hover:scale-[1.02]">
                    <div class="w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center mb-4 text-2xl">🚀</div>
                    <h3 class="text-lg font-bold mb-1 text-indigo-600">Featured Placement</h3>
                    <p class="text-slate-400 text-xs mb-4">Get listed at the top of the index.</p>
                    <span class="text-xs font-black uppercase tracking-widest text-indigo-600 border-b-2 border-indigo-600">Reserve Slot</span>
                </a>
            </div>
        </section>

        <h2 class="text-3xl font-black mb-12">Intelligence <span class="text-indigo-600">Feed</span></h2>
        <div id="post-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="bg-slate-900 text-white py-20 mt-20">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-4">Last Full Sync: {{DATE}}</p>
            <a href="https://buy.stripe.com/aFafZgepV8NW7Cwc788so07" class="inline-block bg-indigo-600 text-white px-10 py-4 rounded-full font-black hover:bg-indigo-50 hover:text-indigo-600 transition-all shadow-2xl">Promote Your Agent</a>
        </div>
    </footer>
</body>
</html>
