<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | AI Agent Index & Rating</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <meta property="og:title" content="{{TITLE}} - AI ROI Score: {{SCORE}}/100">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:type" content="article">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="../" class="text-indigo-600 font-bold flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
                Directory
            </a>
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-black bg-slate-100 px-2 py-1 rounded">REV: 2026.Q1</span>
            </div>
        </div>
    </header>
    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden mb-12">
            <div class="bg-indigo-600 p-8 text-white flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h1 class="text-4xl font-black mb-2">{{TITLE}}</h1>
                    <p class="text-indigo-100 opacity-80">Autonomous AI Agent Analysis Report</p>
                </div>
                <div class="text-center bg-white/10 p-4 rounded-2xl backdrop-blur-sm border border-white/20">
                    <div class="text-xs font-bold uppercase tracking-widest mb-1">ROI Score</div>
                    <div class="text-5xl font-black">{{SCORE}}<span class="text-xl opacity-50">/100</span></div>
                </div>
            </div>
            
            <div class="p-10">
                <div class="text-sm font-bold text-indigo-500 mb-6 uppercase tracking-widest border-b pb-2">Technical Deep Dive</div>
                <div id="content" class="leading-relaxed space-y-6 text-slate-700">
                    {{CONTENT}}
                </div>
                
                <div class="mt-12 p-6 bg-slate-50 rounded-2xl border border-slate-100">
                    <h3 class="font-bold mb-4">Final Verdict</h3>
                    <p class="text-sm text-slate-600 italic">"{{DESCRIPTION}}"</p>
                </div>
            </div>
        </div>

        <section>
            <h2 class="text-2xl font-bold mb-6">Market Alternatives</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                {{RELATED_POSTS}}
            </div>
        </section>
    </main>
    <footer class="text-center py-10 text-slate-400 text-sm border-t mt-12">
        &copy; 2026 Global AI Agent Index. Proprietary Rating Engine v4.0.
    </footer>
</body>
</html>
