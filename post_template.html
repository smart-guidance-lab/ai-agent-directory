<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | AI ROI Analysis & Interactive Guide</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .chat-shadow { box-shadow: 0 -10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-32">
    <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="../" class="font-bold text-indigo-600 flex items-center gap-1 italic">← Index</a>
            <div class="text-[10px] font-black bg-indigo-600 text-white px-2 py-1 rounded tracking-widest uppercase">Verified ROI</div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <article class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden mb-12">
            <div class="bg-slate-900 p-10 text-white">
                <h1 class="text-4xl font-black mb-4">{{TITLE}}</h1>
                <div class="flex items-center gap-6">
                    <div class="bg-indigo-500 px-4 py-2 rounded-xl text-center">
                        <div class="text-[10px] uppercase font-bold opacity-70">Score</div>
                        <div class="text-2xl font-black">{{SCORE}}</div>
                    </div>
                    <p class="text-slate-400 text-sm leading-relaxed">{{DESCRIPTION}}</p>
                </div>
            </div>
            <div class="p-10 prose prose-slate max-w-none text-slate-700 leading-relaxed">
                {{CONTENT}}
            </div>
        </article>
    </main>

    <div class="fixed bottom-0 left-0 right-0 glass border-t border-slate-200 p-4 chat-shadow z-50">
        <div class="max-w-4xl mx-auto">
            <div id="chat-box" class="hidden mb-4 p-4 bg-white rounded-2xl border border-slate-100 max-h-40 overflow-y-auto text-sm text-slate-600">
                </div>
            <div class="flex gap-2">
                <input type="text" id="user-input" placeholder="Ask AI about how to use {{TITLE}} for your business..." 
                       class="flex-grow bg-slate-100 border-none rounded-full px-6 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                <button onclick="askAI()" class="bg-indigo-600 text-white px-6 py-3 rounded-full text-sm font-bold hover:bg-indigo-700 transition-all">Ask</button>
            </div>
        </div>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value) return;

            chatBox.classList.remove('hidden');
            chatBox.innerHTML = '<span class="animate-pulse">Analyzing context and generating response...</span>';
            
            // Note: In a real production, you'd call a small Edge Function (Vercel) here.
            // For this static version, we simulate a high-quality expert response.
            setTimeout(() => {
                chatBox.innerHTML = `<strong>AI Insight:</strong> To implement {{TITLE}} in your specific workflow, focus on the Business Impact mentioned above. Consider starting with a low-risk integration to maximize the ROI of ${input.value}. <br><br> <a href="https://buy.stripe.com/aFafZgepV8NW7Cwc788so07" class="text-indigo-600 font-bold underline">Want a custom implementation plan? Contact us →</a>`;
                input.value = '';
            }, 1500);
        }
    </script>
</body>
</html>
