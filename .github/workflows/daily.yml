name: Daily AI Agent Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Node.js 20の警告を消し、Node.js 24での動作を確定させる
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests openai
      - name: Run script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py
      - name: Commit and Push
        run: |
          git config user.name "Auto-Agent"
          git config user.email "auto@example.com"
          git add .
          git commit -m "Ultimate Fix: Sitemap rename and SEO logic update" || exit 0
          git push
