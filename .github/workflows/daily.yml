name: Daily AI Agent Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # ジョブ全体にNode.js 24強制フラグを適用
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests openai
      - name: Run script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py
      - name: Commit and Push
        run: |
          git config user.name "Auto-Agent"
          git config user.email "auto@example.com"
          git add .
          git commit -m "Final Fix: Node24 and Google-Strict XML Structure" || exit 0
          git push
