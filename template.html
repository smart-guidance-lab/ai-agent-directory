<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Index | Market Intelligence App</title>
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2593/2593635.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="alternate" type="application/rss+xml" title="AI Agent Index RSS" href="/feed.xml" />
    <meta name="google-site-verification" content="n2V60v_i47eXrWEGYi1WRTrD9-tidkXkJhrbjDgTkXU" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .featured-glow { box-shadow: 0 0 25px rgba(79, 70, 229, 0.2); border: 2px solid #4f46e5; }
        .stat-card { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); }
        /* PWA Splash Screen Avoidance */
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg">A</div>
                <h1 class="text-xl font-black tracking-tighter uppercase">Agent<span class="text-indigo-600">Index</span></h1>
            </div>
            <a href="https://buy.stripe.com/aFafZgepV8NW7Cwc788so07" class="bg-indigo-600 text-white px-5 py-2 rounded-full text-xs font-bold shadow-md">Submit</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <section class="mb-12 grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="stat-card p-6 rounded-3xl border border-slate-200 text-center">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Total Agents</div>
                <div class="text-2xl font-black text-slate-800">{{TOTAL_COUNT}}</div>
            </div>
            <div class="stat-card p-6 rounded-3xl border border-slate-200 text-center">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Global Heat</div>
                <div class="text-2xl font-black text-orange-500">{{TOTAL_STARS}}k</div>
            </div>
            <div class="stat-card p-6 rounded-3xl border border-slate-200 text-center">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Rating</div>
                <div class="text-2xl font-black text-indigo-600">v5.0</div>
            </div>
            <div class="stat-card p-6 rounded-3xl border border-slate-200 text-center">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Network</div>
                <div class="text-2xl font-black text-green-500 flex items-center justify-center gap-1">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>
                    ON
                </div>
            </div>
        </section>

        <h2 class="text-2xl font-black mb-8">Intelligence <span class="text-indigo-600">Feed</span></h2>
        <div id="post-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <footer class="bg-slate-900 text-white py-16">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <p class="text-slate-500 text-[10px] font-bold uppercase mb-4 tracking-[0.2em]">Last Sync: {{DATE}}</p>
            <a href="https://buy.stripe.com/aFafZgepV8NW7Cwc788so07" class="inline-block bg-white text-slate-900 px-10 py-4 rounded-full font-black hover:bg-indigo-50 transition-all">Get Featured</a>
        </div>
    </footer>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
