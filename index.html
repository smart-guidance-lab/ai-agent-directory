<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI Agent Directory | Professional Analysis</title>
    <meta name="google-site-verification" content="n2V60v_i47eXrWEGYi1WRTrD9-tidkXkJhrbjDgTkXU" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold">A</div>
                <h1 class="text-xl font-black tracking-tighter">AGENT<span class="text-indigo-600">INDEX</span></h1>
            </div>
            <nav id="nav-links" class="hidden"></nav> <a href="https://buy.stripe.com/aFafZgepV8NW7Cwc788so07" class="bg-indigo-600 text-white px-6 py-2 rounded-full text-sm font-bold">Featured Listing</a>
        </div>
    </header>
    <main class="max-w-6xl mx-auto px-6 py-16">
        <h2 class="text-4xl font-extrabold mb-12">Latest <span class="text-indigo-600">AI Agents</span></h2>
        <div id="post-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>
    <script>
        async function loadAgents() {
            const res = await fetch('./data.json');
            const agents = await res.json();
            const container = document.getElementById('post-list');
            const nav = document.getElementById('nav-links');
            container.innerHTML = '';
            agents.forEach(name => {
                // ユーザー用カード
                const card = document.createElement('div');
                card.className = 'bg-white p-8 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-all cursor-pointer';
                card.onclick = () => window.location.href = `./agent/${name}`;
                card.innerHTML = `<h3 class="text-xl font-bold mb-2">${name}</h3><p class="text-slate-500 text-sm">Deep analysis and business impact report.</p>`;
                container.appendChild(card);
                
                // クローラー用テキストリンク（重要）
                const link = document.createElement('a');
                link.href = `./agent/${name}`;
                link.innerText = name;
                nav.appendChild(link);
            });
        }
        loadAgents();
    </script>
</body>
</html>
